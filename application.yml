spring:
  rabbitmq:
    host: ${SPRING_RABBITMQ_HOST:localhost}
    port: 5672
    username: ${RABBITMQ_USER}
    password: ${RABBITMQ_PASS}
  data:
    redis:
      host: ${SPRING_REDIS_HOST:localhost}
      port: 6379
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/tookyourmedicine}
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: medicine
  flyway:
    enabled: true
    locations: classpath:db/migration
    schemas: medicine
    default-schema: medicine
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/tookyourmedicine}
    user: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
