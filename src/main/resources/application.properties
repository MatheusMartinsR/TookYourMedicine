spring.application.name=tookYourMedicine

spring.rabbitmq.host=${SPRING_RABBITMQ_HOST:localhost}
spring.rabbitmq.port=5672
spring.rabbitmq.username=${RABBITMQ_USER}
spring.rabbitmq.password=${RABBITMQ_PASS}

spring.data.redis.host=${SPRING_REDIS_HOST:localhost}
spring.data.redis.port=6379


spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/tookyourmedicine?currentSchema=medicine}
spring.datasource.username=${POSTGRES_USER}
spring.datasource.password=${POSTGRES_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.default_schema=medicine

spring.flyway.enabled=true
spring.flyway.locations=classpath:/db/migration
spring.flyway.schemas=medicine
spring.flyway.default-schema=medicine
